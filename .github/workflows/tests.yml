name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']
        laravel: [8, 9, 10, 11, 12]
        exclude:
          # Laravel 8 supports PHP 8.0 / 8.1
          - { laravel: 8,  php: '8.2' }
          - { laravel: 8,  php: '8.3' }
          - { laravel: 8,  php: '8.4' }
          # Laravel 9 supports PHP 8.0 – 8.2
          - { laravel: 9,  php: '8.3' }
          - { laravel: 9,  php: '8.4' }
          # Laravel 10 supports PHP 8.1 – 8.3
          - { laravel: 10, php: '8.0' }
          - { laravel: 10, php: '8.4' }
          # Laravel 11 / 12 require PHP 8.2+
          - { laravel: 11, php: '8.0' }
          - { laravel: 11, php: '8.1' }
          - { laravel: 12, php: '8.0' }
          - { laravel: 12, php: '8.1' }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-
            composer-php-${{ matrix.php }}-

      - name: Install dependencies
        run: |
          TESTBENCH=$((${{ matrix.laravel }} - 2))
          composer update --prefer-dist --no-interaction --no-progress \
            --with="illuminate/support:^${{ matrix.laravel }}" \
            --with="orchestra/testbench:^$TESTBENCH"

      - name: Execute tests
        run: vendor/bin/phpunit
